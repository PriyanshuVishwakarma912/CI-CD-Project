name: Python App Deployment
on:
    push:
        branches: ['main']
jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            
            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_1 }}
                aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_ID_1 }}
                aws-region: ${{ secrets.AWS_REGION }}

            - name: Login to AWS ECR
              id: login-ecr
              uses: aws-actions/amazon-ecr-login@v2

            - name: Build and Push
              env:
                ecr_registory: ${{ steps.login-ecr.outputs.registry  }}
                ecr_repository: ci-cd-project
                image_tag: latest
              run: |
                docker build -t $ecr_registory/$ecr_repository:$image_tag .
                docker push $ecr_registory/$ecr_repository:$image_tag  
